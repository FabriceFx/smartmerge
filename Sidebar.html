<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <!-- Typography and Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      /* Material 3 Light Theme Tokens */
      --md-sys-color-primary: #0b57d0;
      --md-sys-color-on-primary: #ffffff;
      --md-sys-color-primary-container: #d3e3fd;
      --md-sys-color-on-primary-container: #041e49;
      --md-sys-color-surface: #f8fafd;
      --md-sys-color-on-surface: #1f1f1f;
      --md-sys-color-surface-variant: #e1e2e8;
      --md-sys-color-on-surface-variant: #44474e;
      --md-sys-color-outline: #74777f;
      --md-sys-color-outline-variant: #c4c6d0;
      
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-full: 99px;
    }
    
    body {
      font-family: 'Roboto', sans-serif;
      background-color: var(--md-sys-color-surface);
      color: var(--md-sys-color-on-surface);
      margin: 0;
      padding: 24px 16px;
    }
    
    .container {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    .card {
      background-color: var(--md-sys-color-surface);
      border: 1px solid var(--md-sys-color-outline-variant);
      border-radius: var(--radius-lg);
      padding: 16px;
    }
    
    .card-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--md-sys-color-on-surface-variant);
      margin: 0 0 16px 0;
      letter-spacing: 0.5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .refresh-btn {
      background: transparent;
      border: none;
      color: var(--md-sys-color-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      padding: 4px;
      border-radius: var(--radius-sm);
    }
    .refresh-btn:hover { background: var(--md-sys-color-surface-variant); }
    
    .stats-summary {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    
    .stat-box {
      text-align: center;
    }
    
    .stat-value {
      font-size: 24px;
      font-weight: 400;
      color: var(--md-sys-color-primary);
    }
    
    .stat-label {
      font-size: 12px;
      color: var(--md-sys-color-on-surface-variant);
    }
    
    button.primary {
      background-color: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
      border: none;
      padding: 12px 24px;
      border-radius: var(--radius-full);
      font-family: 'Roboto', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      transition: opacity 0.2s;
    }
    
    button.primary:hover {
      opacity: 0.9;
    }
    
    .empty-state {
      text-align: center;
      color: var(--md-sys-color-on-surface-variant);
      font-size: 13px;
      padding: 32px 16px;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    
    #chartContainer {
      position: relative;
      height: 180px;
      width: 100%;
    }
    
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-card {
      background: var(--md-sys-color-surface);
      padding: 24px;
      border-radius: var(--radius-lg);
      width: 90%;
      max-width: 400px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      max-height: 80vh;
      display: flex;
      flex-direction: column;
    }
    .modal-card h3 { margin: 0 0 16px 0; font-weight: 500; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
    
    .blacklist-container {
      overflow-y: auto;
      flex: 1;
      border: 1px solid var(--md-sys-color-outline-variant);
      border-radius: var(--radius-sm);
      background: white;
    }
    
    .blacklist-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid var(--md-sys-color-surface-variant);
      font-size: 13px;
    }
    .blacklist-item:last-child { border-bottom: none; }
    
    .btn-re {
      background: transparent;
      color: var(--md-sys-color-primary);
      border: 1px solid var(--md-sys-color-outline-variant);
      border-radius: 4px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 11px;
    }
    .btn-re:hover { background: var(--md-sys-color-surface-variant); }
  </style>
</head>
<body>

  <div class="container">
    <button class="primary" onclick="launchComposer()">
      <span class="material-symbols-outlined">edit_square</span>
      Nouvelle campagne
    </button>
    
    <div class="card" id="quotaCard" style="display: none;">
      <div class="card-title">
        <span>Mon Compte</span>
      </div>
      <div style="font-size: 13px; color: var(--md-sys-color-on-surface-variant); margin-bottom: 8px;">
        <span class="material-symbols-outlined" style="font-size: 14px; vertical-align: text-bottom; margin-right: 4px;">account_circle</span>
        <strong id="accountEmail">...</strong>
      </div>
      <div style="display: flex; justify-content: space-between; align-items: center; font-size: 11px; margin-bottom: 4px;">
        <span id="accountType" style="background: var(--md-sys-color-primary-container); color: var(--md-sys-color-on-primary-container); padding: 2px 6px; border-radius: 4px;">...</span>
        <span>Quota: <strong id="accountQuotaText">...</strong></span>
      </div>
      <div style="height: 6px; background: var(--md-sys-color-surface-variant); border-radius: 3px; overflow: hidden;">
        <div id="accountQuotaFill" style="height: 100%; background: var(--md-sys-color-primary); width: 0%;"></div>
      </div>
    </div>
    
    <div class="card">
      <div class="card-title">
        <span>Performance</span>
        <button class="refresh-btn" onclick="loadStats()" title="Rafraîchir">
          <span class="material-symbols-outlined" style="font-size: 18px;">refresh</span>
        </button>
      </div>
      
      <div id="statsLoader" class="empty-state">Chargement des données...</div>
      
      <div id="statsContent" style="display: none;">
        <div class="stats-summary">
          <div class="stat-box">
            <div class="stat-value" id="valSent">0</div>
            <div class="stat-label">Envoyés</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="valOpened">0</div>
            <div class="stat-label">Ouverts</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="valRate">0%</div>
            <div class="stat-label">Taux</div>
          </div>
        </div>
        
        <div id="chartContainer">
          <canvas id="openRateChart"></canvas>
        </div>
      </div>
      
    </div>
    
    <button onclick="openBlacklistModal()" style="width:100%; background: transparent; border: 1px solid var(--md-sys-color-error); color: var(--md-sys-color-error); padding: 10px; border-radius: var(--radius-full); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 500; font-family: inherit; font-size: 13px;">
      <span class="material-symbols-outlined" style="font-size: 18px;">block</span>
      Gérer la liste rouge (Désinscrits)
    </button>
  </div>
  
  <div class="modal-overlay" id="blacklistModal">
    <div class="modal-card">
      <h3>🚫 Liste rouge</h3>
      <div id="blacklistLoader" style="font-size:13px; text-align:center; padding: 20px;">Chargement...</div>
      <div class="blacklist-container" id="blacklistContainer" style="display:none;"></div>
      <div class="modal-actions">
        <button onclick="document.getElementById('blacklistModal').style.display='none'" style="padding: 8px 16px; border:none; border-radius: 20px; cursor:pointer;">Fermer</button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', loadStats);
    
    function launchComposer() {
      google.script.run.openComposer();
    }
    
    let currentChart = null;

    function loadStats() {
      document.getElementById('statsLoader').style.display = 'block';
      document.getElementById('statsContent').style.display = 'none';
      if (currentChart) {
        currentChart.destroy();
        currentChart = null;
      }
      
      google.script.run
        .withSuccessHandler(renderStats)
        .withFailureHandler(() => {
          document.getElementById('statsLoader').innerText = "Erreur de chargement.";
        })
        .getCampaignStats();
        
      google.script.run
        .withSuccessHandler(renderQuota)
        .getAccountQuota();
    }
    
    function renderQuota(data) {
      document.getElementById('quotaCard').style.display = 'block';
      document.getElementById('accountEmail').innerText = data.email;
      document.getElementById('accountType').innerText = data.type;
      document.getElementById('accountQuotaText').innerText = `${data.remaining} / ${data.max}`;
      
      const pct = Math.min(100, Math.max(0, (data.remaining / data.max) * 100));
      const fill = document.getElementById('accountQuotaFill');
      fill.style.width = `${pct}%`;
      
      if (pct < 10) {
        fill.style.background = 'var(--md-sys-color-error)';
      } else {
        fill.style.background = 'var(--md-sys-color-primary)';
      }
    }
    
    function renderStats(stats) {
      document.getElementById('statsLoader').style.display = 'none';
      
      if (stats.sent === 0) {
        document.getElementById('statsLoader').innerHTML = `
          <span class="material-symbols-outlined" style="font-size: 40px; color: var(--md-sys-color-outline-variant);">insights</span>
          Lancez votre première campagne pour voir vos statistiques d'ouverture ici !
        `;
        document.getElementById('statsLoader').style.display = 'flex';
        return;
      }
      
      document.getElementById('statsContent').style.display = 'block';
      
      const rate = Math.round((stats.opened / stats.sent) * 100);
      document.getElementById('valSent').innerText = stats.sent;
      document.getElementById('valOpened').innerText = stats.opened;
      document.getElementById('valRate').innerText = `${rate}%`;
      
      // Get colors from CSS variables for Chart.js
      const style = getComputedStyle(document.body);
      const colorPrimary = style.getPropertyValue('--md-sys-color-primary').trim();
      const colorSurfaceVariant = style.getPropertyValue('--md-sys-color-surface-variant').trim();
      const colorOnSurface = style.getPropertyValue('--md-sys-color-on-surface').trim();
      
      const ctx = document.getElementById('openRateChart').getContext('2d');
      currentChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['Ouverts', 'Non ouverts'],
          datasets: [{
            data: [stats.opened, stats.sent - stats.opened],
            backgroundColor: [colorPrimary, colorSurfaceVariant],
            borderWidth: 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: '70%',
          plugins: {
            legend: {
              position: 'bottom',
              labels: { color: colorOnSurface, font: { family: 'Roboto' } }
            }
          }
        }
      });
    }
    
    function openBlacklistModal() {
      document.getElementById('blacklistModal').style.display = 'flex';
      document.getElementById('blacklistLoader').style.display = 'block';
      document.getElementById('blacklistContainer').style.display = 'none';
      
      google.script.run
        .withSuccessHandler(renderBlacklist)
        .withFailureHandler(() => { document.getElementById('blacklistLoader').innerText = "Erreur de chargement."; })
        .getBlacklist();
    }
    
    function renderBlacklist(data) {
      document.getElementById('blacklistLoader').style.display = 'none';
      const container = document.getElementById('blacklistContainer');
      container.style.display = 'block';
      container.innerHTML = '';
      
      if (!data || data.length === 0) {
        container.innerHTML = '<div style="padding:16px; text-align:center; font-size:13px; color:gray;">Aucun e-mail dans la liste rouge.</div>';
        return;
      }
      
      data.forEach(item => {
        const div = document.createElement('div');
        div.className = 'blacklist-item';
        div.innerHTML = `
          <div>
            <strong>${item.email}</strong><br>
            <span style="color:gray; font-size:11px;">Le ${item.date}</span>
          </div>
          <button class="btn-re" onclick="promptResubscribe('${item.email}')">Réinscrire</button>
        `;
        container.appendChild(div);
      });
    }
    
    function promptResubscribe(email) {
      const msg = `⚠️ Avertissement RGPD : Vous êtes sur le point d'annuler la désinscription de ${email}.\n\nConformément à la loi, vous ne devez faire cela que si la personne vous en a fait la demande explicite par écrit. En cas de signalement pour spam, votre compte Google pourrait être bloqué.\n\nConfirmez-vous la réinscription ?`;
      if (confirm(msg)) {
        document.getElementById('blacklistLoader').style.display = 'block';
        document.getElementById('blacklistContainer').style.display = 'none';
        
        google.script.run
          .withSuccessHandler((success) => {
            if (success) {
              openBlacklistModal(); // Reload the list
            } else {
              alert("Impossible de retirer l'adresse de la liste rouge.");
              openBlacklistModal();
            }
          })
          .removeFromBlacklist(email);
      }
    }
  </script>
</body>
</html>

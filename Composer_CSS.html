<style>
    :root {
      --md-sys-color-primary: #0b57d0;
      --md-sys-color-on-primary: #ffffff;
      --md-sys-color-surface: #f8fafd;
      --md-sys-color-on-surface: #1f1f1f;
      --md-sys-color-surface-variant: #e1e2e8;
      --md-sys-color-on-surface-variant: #44474e;
      --md-sys-color-outline: #74777f;
      --md-sys-color-outline-variant: #c4c6d0;
      --md-sys-color-error: #b3261e;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background-color: var(--md-sys-color-surface);
      color: var(--md-sys-color-on-surface);
      margin: 0;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    
    .panel-left {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--md-sys-color-outline-variant);
      padding: 16px;
      overflow-y: auto;
      gap: 16px;
    }
    
    .panel-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px;
      background-color: var(--md-sys-color-surface-variant);
      gap: 12px;
    }

    h2 {
      font-size: 16px;
      font-weight: 500;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .form-row {
      display: flex;
      gap: 12px;
    }
    
    .form-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    label {
      font-size: 13px;
      color: var(--md-sys-color-on-surface-variant);
      font-weight: 500;
    }
    
    input, select {
      padding: 10px;
      border: 1px solid var(--md-sys-color-outline);
      border-radius: var(--radius-sm);
      font-family: inherit;
      background: transparent;
      color: var(--md-sys-color-on-surface);
    }
    
    input:focus, select:focus {
      border-color: var(--md-sys-color-primary);
      outline: none;
    }

    .template-controls {
      display: flex;
      gap: 8px;
    }
    .template-controls select { flex: 1; }
    
    .icon-btn {
      background: transparent;
      border: 1px solid var(--md-sys-color-outline);
      color: var(--md-sys-color-error);
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      padding: 4px;
    }
    .icon-btn:hover { background: rgba(255,0,0,0.1); }

    #editor-container {
      height: 250px;
      background: var(--md-sys-color-surface);
    }

    .vars-container {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px;
      background: rgba(0,0,0,0.03);
      border-radius: var(--radius-sm);
    }

    .var-chip {
      background: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 11px;
      cursor: pointer;
      border: none;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: auto;
      padding-top: 16px;
    }

    button {
      padding: 10px 20px;
      border-radius: 20px;
      border: none;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: 0.2s;
      font-family: inherit;
    }

    button.primary { background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); }
    button.secondary { background: transparent; color: var(--md-sys-color-primary); border: 1px solid var(--md-sys-color-outline); }
    button:disabled { opacity: 0.5; pointer-events: none; }

    /* Right Panel: Preview & Recipients */
    .preview-box {
      flex: 1;
      background: var(--md-sys-color-surface);
      border: 1px solid var(--md-sys-color-outline-variant);
      border-radius: var(--radius-md);
      padding: 16px;
      overflow-y: auto;
      position: relative;
    }

    .preview-loader {
      position: absolute;
      top: 8px; right: 8px;
      font-size: 11px;
      color: var(--md-sys-color-on-surface-variant);
      display: none;
    }

    #previewBody p {
      margin: 0;
      padding: 0;
    }

    .recipients-list {
      height: 150px;
      overflow-y: auto;
      background: var(--md-sys-color-surface);
      border: 1px solid var(--md-sys-color-outline-variant);
      border-radius: var(--radius-sm);
      padding: 8px;
    }

    .recipient-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      font-size: 13px;
    }

    .progress-container {
      display: none;
      flex-direction: column;
      gap: 8px;
      margin-top: 16px;
    }
    .progress-bar-bg {
      height: 8px;
      background: var(--md-sys-color-surface-variant);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--md-sys-color-primary);
      width: 0%;
      transition: width 0.3s;
    }
    .progress-text {
      font-size: 12px;
      text-align: right;
      color: var(--md-sys-color-on-surface-variant);
    }

    /* Custom Modals */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-card {
      background: var(--md-sys-color-surface);
      padding: 24px;
      border-radius: var(--radius-lg);
      width: 400px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }
    .modal-card h3 { margin: 0 0 16px 0; font-weight: 500; }
    .modal-card p { font-size: 14px; margin: 0 0 20px 0; color: var(--md-sys-color-on-surface-variant); line-height: 1.5; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
  </style>

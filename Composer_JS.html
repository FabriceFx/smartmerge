<script>
    let quill;
    let headersList = [];
    let recipientsData = [];
    let pollInterval = null;
    let templatesData = {};
    let previewTimeout = null;

    document.addEventListener('DOMContentLoaded', () => {
      quill = new Quill('#editor-container', {
        theme: 'snow',
        modules: {
          toolbar: [
            ['bold', 'italic', 'underline', 'strike'],
            [{ 'color': [] }, { 'background': [] }],
            [{ 'header': [1, 2, false] }],
            [{ 'list': 'ordered'}, { 'list': 'bullet' }],
            ['link', 'clean']
          ]
        }
      });
      
      quill.on('text-change', queuePreviewUpdate);
      
      google.script.run.withSuccessHandler(initHeaders).getSheetHeaders();
      google.script.run.withSuccessHandler(initTemplates).getTemplates();
    });

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    
    function showAlert(text, title = "Information", onClose = null) {
      document.getElementById('alertTitle').innerText = title;
      document.getElementById('alertText').innerHTML = text;
      const btn = document.getElementById('alertOkBtn');
      btn.onclick = () => {
        closeModal('alertModal');
        if (onClose) onClose();
      };
      document.getElementById('alertModal').style.display = 'flex';
    }

    function initHeaders(headers) {
      headersList = headers;
      const select = document.getElementById('emailCol');
      const varsContainer = document.getElementById('varsContainer');
      
      headers.forEach((header, index) => {
        const option = document.createElement('option');
        option.value = index;
        option.text = header;
        if (header.toString().toLowerCase().includes('mail')) option.selected = true;
        select.appendChild(option);
        
        const chip = document.createElement('button');
        chip.className = 'var-chip';
        chip.innerText = `{{${header}}}`;
        chip.onclick = () => {
          if (isHtmlView) {
            const htmlEditor = document.getElementById('html-editor');
            const start = htmlEditor.selectionStart;
            const end = htmlEditor.selectionEnd;
            const text = htmlEditor.value;
            htmlEditor.value = text.substring(0, start) + `{{${header}}}` + text.substring(end);
            htmlEditor.focus();
            htmlEditor.selectionStart = htmlEditor.selectionEnd = start + header.length + 4;
          } else {
            const range = quill.getSelection(true);
            quill.insertText(range.index, `{{${header}}}`);
          }
          queuePreviewUpdate();
        };
        varsContainer.appendChild(chip);
      });
      
      loadRecipients();
    }
    
    // -- HTML Toggle --
    let isHtmlView = false;
    function toggleHtmlView() {
      const editorContainer = document.getElementById('editor-container');
      const toolbar = document.querySelector('.ql-toolbar');
      const htmlEditor = document.getElementById('html-editor');
      const btn = document.getElementById('btnToggleHtml');
      
      isHtmlView = !isHtmlView;
      
      if (isHtmlView) {
        htmlEditor.value = quill.root.innerHTML;
        editorContainer.style.display = 'none';
        toolbar.style.display = 'none';
        htmlEditor.style.display = 'block';
        btn.innerHTML = '<span class="material-symbols-outlined" style="font-size: 14px;">edit</span> Mode visuel';
      } else {
        quill.root.innerHTML = htmlEditor.value;
        htmlEditor.style.display = 'none';
        editorContainer.style.display = 'block';
        toolbar.style.display = 'block';
        btn.innerHTML = '<span class="material-symbols-outlined" style="font-size: 14px;">code</span> Voir HTML';
      }
      queuePreviewUpdate();
    }

    // -- Templates --
    function initTemplates(data) {
      templatesData = data;
      const select = document.getElementById('templateSelect');
      select.innerHTML = '<option value="">Sélectionner un modèle...</option>';
      for (const name in data) {
        const option = document.createElement('option');
        option.value = name;
        option.text = name;
        select.appendChild(option);
      }
    }

    function openSaveTemplateModal() {
      document.getElementById('templateNameInput').value = '';
      document.getElementById('saveTemplateModal').style.display = 'flex';
      document.getElementById('templateNameInput').focus();
    }

    function confirmSaveTemplate() {
      const name = document.getElementById('templateNameInput').value;
      if (!name) return;
      closeModal('saveTemplateModal');
      
      const subject = document.getElementById('subject').value;
      const body = isHtmlView ? document.getElementById('html-editor').value : quill.root.innerHTML;
      const senderName = document.getElementById('senderName').value;
      const noReply = document.getElementById('noReply').checked;
      const tracking = document.getElementById('tracking').checked;
      const unsubscribeLink = document.getElementById('unsubscribeLink').checked;
      
      document.getElementById('btnSend').disabled = true;
      google.script.run
        .withSuccessHandler((data) => {
          initTemplates(data);
          document.getElementById('templateSelect').value = name;
          document.getElementById('btnSend').disabled = false;
        })
        .saveTemplate(name, { subject, body, senderName, noReply, tracking, unsubscribeLink });
    }

    function loadTemplate() {
      const name = document.getElementById('templateSelect').value;
      if (name && templatesData[name]) {
        document.getElementById('subject').value = templatesData[name].subject || '';
        document.getElementById('senderName').value = templatesData[name].senderName || '';
        document.getElementById('noReply').checked = !!templatesData[name].noReply;
        document.getElementById('tracking').checked = templatesData[name].tracking !== false;
        document.getElementById('unsubscribeLink').checked = !!templatesData[name].unsubscribeLink;
        
        const bodyContent = templatesData[name].body || '';
        if (isHtmlView) {
          document.getElementById('html-editor').value = bodyContent;
        } else {
          quill.root.innerHTML = bodyContent;
        }
        
        queuePreviewUpdate();
      }
    }

    function promptDeleteTemplate() {
      const name = document.getElementById('templateSelect').value;
      if (!name) return;
      document.getElementById('deleteTemplateNameDisplay').innerText = name;
      document.getElementById('deleteTemplateModal').style.display = 'flex';
    }

    function confirmDeleteTemplate() {
      const name = document.getElementById('templateSelect').value;
      if (!name) return;
      
      closeModal('deleteTemplateModal');
      document.getElementById('btnSend').disabled = true;
      google.script.run
        .withSuccessHandler((data) => {
          initTemplates(data);
          document.getElementById('btnSend').disabled = false;
          document.getElementById('subject').value = '';
          quill.root.innerHTML = '';
          queuePreviewUpdate();
        })
        .deleteTemplate(name);
    }

    // -- Recipients --
    function loadRecipients() {
      const colIndex = parseInt(document.getElementById('emailCol').value);
      if (isNaN(colIndex)) return;
      
      google.script.run
        .withSuccessHandler(renderRecipients)
        .getRecipientsList(colIndex);
    }

    function renderRecipients(data) {
      recipientsData = data;
      const list = document.getElementById('recipientsList');
      list.innerHTML = '';
      document.getElementById('recipCount').innerText = data.length;
      
      data.forEach((recip) => {
        const div = document.createElement('div');
        div.className = 'recipient-item';
        div.innerHTML = `
          <input type="checkbox" checked value="${recip.index}" onchange="updateCountAndPreview()">
          <span>${recip.email}</span>
        `;
        list.appendChild(div);
      });
      
      queuePreviewUpdate();
    }

    function getExcludedRows() {
      const checkboxes = document.querySelectorAll('#recipientsList input[type="checkbox"]');
      const excluded = [];
      checkboxes.forEach(cb => {
        if (!cb.checked) excluded.push(parseInt(cb.value));
      });
      return excluded;
    }

    function updateCountAndPreview() {
      const excluded = getExcludedRows();
      document.getElementById('recipCount').innerText = recipientsData.length - excluded.length;
      queuePreviewUpdate();
    }

    // -- Server Preview --
    function queuePreviewUpdate() {
      clearTimeout(previewTimeout);
      previewTimeout = setTimeout(fetchPreview, 600); // 600ms debounce
    }

    function fetchPreview() {
      const subject = document.getElementById('subject').value;
      const body = isHtmlView ? document.getElementById('html-editor').value : quill.root.innerHTML;
      const excluded = getExcludedRows();
      const previewData = recipientsData.find(r => !excluded.includes(r.index));
      
      if (!previewData) {
        document.getElementById('previewSubject').innerText = subject || 'Sans objet';
        document.getElementById('previewBody').innerHTML = body;
        return;
      }

      const showUnsub = document.getElementById('unsubscribeLink').checked;

      document.getElementById('previewLoader').style.display = 'block';
      google.script.run
        .withSuccessHandler((res) => {
          document.getElementById('previewLoader').style.display = 'none';
          document.getElementById('previewSubject').innerText = res.subject || 'Sans objet';
          document.getElementById('previewBody').innerHTML = res.body;
        })
        .withFailureHandler(() => {
          document.getElementById('previewLoader').style.display = 'none';
        })
        .getPreviewData(previewData.index, subject, body, showUnsub);
    }

    // -- Sending --
    function prepareCampaign() {
      const emailCol = document.getElementById('emailCol').value;
      const subject = document.getElementById('subject').value;
      const body = isHtmlView ? document.getElementById('html-editor').value : quill.root.innerHTML;
      const senderName = document.getElementById('senderName').value;
      const unsubscribeLink = document.getElementById('unsubscribeLink').checked;
      const excludedRows = getExcludedRows();
      
      if (!emailCol || !subject || !body || body === '<p><br></p>') {
        showAlert("Veuillez remplir l'objet et le corps du message.", "Attention");
        return;
      }
      
      if (recipientsData.length - excludedRows.length === 0) {
        showAlert("Aucun destinataire sélectionné.", "Attention");
        return;
      }

      // --- Spam Check Logic ---
      const warnings = [];
      
      if (!unsubscribeLink) {
        warnings.push("Le lien de désabonnement n'est pas activé (Fort risque RGPD).");
      }
      if (!senderName.trim()) {
        warnings.push("Le nom d'expéditeur est vide (Risque d'être bloqué en spam).");
      }
      
      const spamWords = ["gratuit", "urgent", "promotion exceptionnelle", "gagnez de l'argent", "offre spéciale", "100% garanti", "gagnez"];
      const textToAnalyze = (subject + " " + body).toLowerCase();
      const foundWords = spamWords.filter(word => textToAnalyze.includes(word));
      if (foundWords.length > 0) {
        warnings.push(`Mots toxiques détectés : ${foundWords.join(', ')}.`);
      }
      
      const subjectUpperCount = subject.replace(/[^A-Z]/g, "").length;
      if (subject.length > 5 && subjectUpperCount / subject.length > 0.5) {
        warnings.push("L'objet contient trop de majuscules.");
      }
      if ((subject.match(/!/g) || []).length > 1) {
        warnings.push("L'objet contient trop de points d'exclamation.");
      }
      
      const hasImage = body.includes('<img');
      const textOnly = body.replace(/<[^>]+>/g, '').trim();
      if (hasImage && textOnly.length < 50) {
        warnings.push("Votre message contient une image mais trop peu de texte (Ratio image/texte déséquilibré).");
      }
      
      if (warnings.length > 0) {
        const list = document.getElementById('spamWarningsList');
        list.innerHTML = warnings.map(w => `<li>${w}</li>`).join('');
        document.getElementById('spamCheckModal').style.display = 'flex';
        return;
      }

      proceedWithCampaign();
    }

    function proceedWithCampaign() {
      closeModal('spamCheckModal');
      document.getElementById('btnSend').disabled = true;
      document.getElementById('confirmSendText').innerText = "Vérification des quotas...";
      document.getElementById('confirmSendModal').style.display = 'flex';
      document.getElementById('finalSendBtn').disabled = true;

      const config = {
        emailColumnIndex: parseInt(document.getElementById('emailCol').value, 10),
        subject: document.getElementById('subject').value,
        body: isHtmlView ? document.getElementById('html-editor').value : quill.root.innerHTML,
        senderName: document.getElementById('senderName').value,
        noReply: document.getElementById('noReply').checked,
        tracking: document.getElementById('tracking').checked,
        unsubscribeLink: document.getElementById('unsubscribeLink').checked,
        excludedRows: getExcludedRows()
      };

      google.script.run
        .withSuccessHandler(showConfirmDialog)
        .withFailureHandler((err) => {
          closeModal('confirmSendModal');
          let msg = err.message || err;
          if (typeof msg === 'string') msg = msg.replace(/^Error: /, '');
          showAlert(msg, "Action requise");
          document.getElementById('btnSend').disabled = false;
        })
        .getPreflightInfo(config);
    }

    function cancelSend() {
      closeModal('confirmSendModal');
      document.getElementById('btnSend').disabled = false;
    }

    function showConfirmDialog(info) {
      if (info.validCount === 0) {
        closeModal('confirmSendModal');
        showAlert("Aucun destinataire valide.", "Attention");
        document.getElementById('btnSend').disabled = false;
        return;
      }
      
      const confirmText = document.getElementById('confirmSendText');
      const finalBtn = document.getElementById('finalSendBtn');
      
      if (info.validCount > info.quota) {
        confirmText.innerHTML = `⚠️ <b>Attention</b> : Vous avez <b>${info.validCount}</b> destinataires, mais votre quota restant est de <b>${info.quota}</b> e-mails.<br><br>Seuls les ${info.quota} premiers seront envoyés.`;
        finalBtn.innerText = "Envoyer partiellement";
      } else {
        confirmText.innerHTML = `Prêt à envoyer à <b>${info.validCount}</b> destinataire(s).<br>Quota restant après envoi : ${info.quota - info.validCount}.`;
        finalBtn.innerText = "Confirmer l'envoi";
      }
      
      if (info.trackingWarning) {
        confirmText.innerHTML += `<br><br><span style="color:var(--md-sys-color-error)"><b>⚠️ Avertissement Tracking :</b><br>${info.trackingWarning}</span>`;
      }
      
      finalBtn.disabled = false;
    }

    function executeSend() {
      closeModal('confirmSendModal');
      document.getElementById('btnSend').disabled = true;
      document.getElementById('progressContainer').style.display = 'flex';
      
      const config = {
        emailColumnIndex: parseInt(document.getElementById('emailCol').value, 10),
        subject: document.getElementById('subject').value,
        body: isHtmlView ? document.getElementById('html-editor').value : quill.root.innerHTML,
        senderName: document.getElementById('senderName').value,
        noReply: document.getElementById('noReply').checked,
        tracking: document.getElementById('tracking').checked,
        unsubscribeLink: document.getElementById('unsubscribeLink').checked,
        excludedRows: getExcludedRows()
      };
      
      google.script.run.clearProgress();
      
      google.script.run
        .withSuccessHandler(onComplete)
        .withFailureHandler(onError)
        .sendEmails(config);
        
      pollInterval = setInterval(pollProgress, 2000);
    }
    
    function pollProgress() {
      google.script.run
        .withSuccessHandler((data) => {
          if (data) {
            const pct = Math.round((data.current / data.total) * 100) || 0;
            document.getElementById('progressBar').style.width = `${pct}%`;
            document.getElementById('progressText').innerText = `${data.status} (${data.current}/${data.total})`;
          }
        })
        .getProgress();
    }
    
    function onComplete(res) {
      clearInterval(pollInterval);
      document.getElementById('progressBar').style.width = `100%`;
      document.getElementById('progressText').innerText = res.message;
      google.script.run.clearProgress();
      showAlert(res.message, "Succès", () => {
        google.script.host.close();
      });
    }
    
    function onError(err) {
      clearInterval(pollInterval);
      document.getElementById('progressText').innerText = "Erreur : " + err.message;
      document.getElementById('btnSend').disabled = false;
    }
  </script>
